<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brotato DLC</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; }
        #canvas { display: block; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        .launcher { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #222; }
        #status { font-size: 1.2rem; margin-bottom: 20px; color: #4ba2ff; }
        .progress-bar { width: 300px; height: 10px; background: #444; border-radius: 5px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #4ba2ff; transition: width 0.2s; }
        button { padding: 15px 30px; font-size: 1.1rem; cursor: pointer; background: #4ba2ff; border: none; border-radius: 5px; color: white; }
    </style>
</head>
<body>

    <div class="launcher" id="ui">
        <div id="status">Ready to Load</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <br>
        <button id="start-btn">START GAME</button>
    </div>

    <canvas id="canvas"></canvas>

    <script src="Brotato.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress-fill');
        const uiEl = document.getElementById('ui');

        const mergedFiles = {};

        // 1. Intercepting the engine's requests to use our merged "blobs"
        const originalFetch = window.fetch;
        window.fetch = function(url) {
            const u = url.toString();
            if (u.includes("Brotato.pck")) return Promise.resolve(new Response(mergedFiles['pck']));
            if (u.includes("Brotato.wasm")) return Promise.resolve(new Response(mergedFiles['wasm']));
            return originalFetch(url);
        };

        async function downloadParts(baseName, count, type) {
            let parts = [];
            for (let i = 1; i <= count; i++) {
                statusEl.innerText = `Syncing ${baseName} (Part ${i}/${count})...`;
                const resp = await originalFetch(`./${baseName}.part${i}`);
                if (!resp.ok) throw new Error(`Failed to find ${baseName}.part${i}`);
                const data = await resp.arrayBuffer();
                parts.push(data);

                // Update progress bar
                let currentTotal = (type === 'pck' ? (i / count) * 80 : 80 + (i / count) * 20);
                progressEl.style.width = currentTotal + "%";
            }
            return new Blob(parts, { type: 'application/octet-stream' });
        }

        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('start-btn').style.display = 'none';
            try {
                // 2. Fetch all 10 parts
                mergedFiles['pck'] = await downloadParts("Brotato.pck", 8, 'pck');
                mergedFiles['wasm'] = await downloadParts("Brotato.wasm", 2, 'wasm');

                statusEl.innerText = "Booting Engine...";

                // 3. Start Godot Engine
                const engine = new Engine({
                    "args": [],
                    "canvasResizePolicy": 2,
                    "ensureCrossOriginIsolationHeaders": false, // Required for school Chromebooks
                    "executable": "Brotato",
                    "fileSizes": { "Brotato.pck": 200062144, "Brotato.wasm": 43016933 },
                    "focusCanvas": true
                });

                await engine.startGame();
                uiEl.remove(); // Hide launcher when game starts

            } catch (err) {
                statusEl.innerText = "Error: Files not found on GitHub.";
                console.error(err);
            }
        };
    </script>
</body>
</html>
